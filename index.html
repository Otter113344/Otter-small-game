<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        body{text-align:center;background:#f0f0f0;padding:20px;}
        #start{padding:10px 20px;font-size:18px;background:green;color:white;border:none;border-radius:8px;}
        #tip{color:red;font-size:18px;display:none;}
        canvas{border:3px solid #333;background:white;}
    </style>
</head>
<body>
    <div id="tip">游戏结束</div>
    <div id="score">得分：0</div>
    <button id="start">开始游戏</button><br>
    <canvas id="c" width="400" height="400"></canvas>

    <script>
        const canvas=document.getElementById('c');
        const ctx=canvas.getContext('2d');
        const startBtn=document.getElementById('start');
        const scoreText=document.getElementById('score');
        const tip=document.getElementById('tip');

        const g=20;
        let snake=[{x:10,y:10}];
        let food={x:5,y:5};
        let dx=1,dy=0;
        let score=0;
        let run=false;
        let loop;

        function draw(){
            ctx.fillStyle="white";
            ctx.fillRect(0,0,400,400);
            ctx.fillStyle="red";
            ctx.fillRect(food.x*g,food.y*g,g-1,g-1);
            for(let i=0;i<snake.length;i++){
                ctx.fillStyle=i==0?"darkgreen":"green";
                ctx.fillRect(snake[i].x*g,snake[i].y*g,g-1,g-1);
            }
            if(!run)return;
            let h={x:snake[0].x+dx,y:snake[0].y+dy};
            if(h.x<0||h.x>=20||h.y<0||h.y>=20||snake.some(s=>s.x==h.x&&s.y==h.y)){
                run=false;
                tip.style.display="block";
                clearInterval(loop);
                return;
            }
            snake.unshift(h);
            if(h.x==food.x&&h.y==food.y){
                score+=10;
                scoreText.innerText="得分："+score;
                food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
            }else{
                snake.pop();
            }
        }

        function begin(){
            snake=[{x:10,y:10}];
            food={x:5,y:5};
            dx=1;dy=0;
            score=0;
            scoreText.innerText="得分：0";
            tip.style.display="none";
            run=true;
            clearInterval(loop);
            loop=setInterval(draw,200);
        }

        document.addEventListener("keydown",e=>{
            if(!run)return;
            if(e.key=="ArrowUp"&&dy!=1){dx=0;dy=-1;}
            if(e.key=="ArrowDown"&&dy!=-1){dx=0;dy=1;}
            if(e.key=="ArrowLeft"&&dx!=1){dx=-1;dy=0;}
            if(e.key=="ArrowRight"&&dx!=-1){dx=1;dy=0;}
        });

        let sx=0,sy=0;
        canvas.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;});
        canvas.addEventListener("touchend",e=>{
            if(!run)return;
            let x=e.changedTouches[0].clientX;
            let y=e.changedTouches[0].clientY;
            if(Math.abs(x-sx)>Math.abs(y-sy)){
                if(x-sx>0&&dx!=-1) {dx=1;dy=0;}
                else if(dx!=1) {dx=-1;dy=0;}
            }else{
                if(y-sy>0&&dy!=-1) {dx=0;dy=1;}
                else if(dy!=1) {dx=0;dy=-1;}
            }
        });

        startBtn.onclick=begin;
        draw();
    </script>
</body>
</html>
