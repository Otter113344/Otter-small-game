<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇最终版</title>
    <style>
        html,body{
            margin:0; padding:20px 0; text-align:center;
            background:#fff; overflow:hidden; touch-action:none;
        }
        #start{
            padding:10px 20px; font-size:18px; 
            background:green; color:white; border:none; border-radius:8px;
            touch-action: manipulation; /* 手机按钮点击更灵敏 */
        }
        #over{color:red; font-size:18px; display:none;}
        #score,#map{font-size:18px; margin:5px 0;}
        canvas{
            border:3px solid #000; width:90vw; max-width:400px; 
            touch-action:none; /* 彻底禁止画布滑动 */
        }
    </style>
</head>
<body>
    <div id="over">游戏结束</div>
    <div id="score">得分：0</div>
    <div id="map">地图：森林</div>
    <button id="start">开始游戏</button><br>
    <canvas id="c" width="400" height="400"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const g=20; // 格子大小

// 全局状态（重置关键）
let map=1;
let bg="#e8f5e9";
let barriers=[{x:3,y:3},{x:10,y:2},{x:16,y:16}];
let portal={x:18,y:18};
let showPortal=false;

let snake=[{x:5,y:5}];
let food={x:10,y:10};
let dx=1, dy=0;
let score=0;
let run=false;
let loop=null; // 定时器初始化

// 初始化绘制（打开就看到地图）
draw();

// 绘制游戏（核心）
function draw(){
    // 1. 地图底色
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,400,400);

    // 2. 障碍
    ctx.fillStyle="#777";
    barriers.forEach(b=>{
        ctx.fillRect(b.x*g,b.y*g,g-1,g-1);
    });

    // 3. 40分显示传送门
    if(showPortal){
        ctx.fillStyle="yellow";
        ctx.fillRect(portal.x*g,portal.y*g,g-1,g-1);
    }

    // 4. 食物
    ctx.fillStyle="red";
    ctx.fillRect(food.x*g,food.y*g,g-1,g-1);

    // 5. 笑脸蛇头+蛇身
    snake.forEach((s,i)=>{
        let x=s.x*g;
        let y=s.y*g;
        if(i==0){
            // 笑脸蛇头
            ctx.fillStyle="#006600";
            ctx.beginPath();
            ctx.arc(x+10,y+10,9,0,Math.PI*2);
            ctx.fill();
            // 眼睛
            ctx.fillStyle="white";
            ctx.fillRect(x+6,y+6,3,3);
            ctx.fillRect(x+11,y+6,3,3);
            // 嘴巴
            ctx.strokeStyle="black";
            ctx.beginPath();
            ctx.arc(x+10,y+12,4,0,Math.PI);
            ctx.stroke();
        }else{
            // 蛇身
            ctx.fillStyle="green";
            ctx.fillRect(x,y,g-1,g-1);
        }
    });
}

// 生成食物（避开蛇/障碍/传送门）
function makeFood(){
    let newFood;
    do {
        newFood={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
        // 避开蛇、障碍、传送门
        const hitSnake = snake.some(s => s.x===newFood.x && s.y===newFood.y);
        const hitBarrier = barriers.some(b => b.x===newFood.x && b.y===newFood.y);
        const hitPortal = newFood.x===portal.x && newFood.y===portal.y;
        if(!hitSnake && !hitBarrier && !hitPortal) break;
    } while(true);
    food=newFood;
}

// 开始游戏（重置所有状态，解决重新开始不重置问题）
function start(){
    // ========== 1. 重置地图 ==========
    map=1; 
    bg="#e8f5e9";
    barriers=[{x:3,y:3},{x:10,y:2},{x:16,y:16}];
    portal={x:18,y:18};
    showPortal=false;
    document.getElementById("map").innerText="地图：森林";

    // ========== 2. 重置蛇 ==========
    snake=[{x:5,y:5}]; // 初始位置
    dx=1; dy=0; // 初始方向

    // ========== 3. 重置得分 ==========
    score=0;
    document.getElementById("score").innerText="得分：0";
    document.getElementById("over").style.display="none";

    // ========== 4. 重置游戏状态 ==========
    run=true;
    makeFood();
    clearInterval(loop); // 清空旧定时器
    loop=setInterval(game,200); // 重启循环

    // 重新绘制
    draw();
}

// 游戏主逻辑
function game(){
    let head={x:snake[0].x+dx, y:snake[0].y+dy};

    // ========== 修复：撞自己死亡 ==========
    const hitSelf = snake.some((s, idx) => {
        if(idx === 0) return false; // 跳过蛇头
        return s.x === head.x && s.y === head.y;
    });

    // 撞墙/撞障碍/撞自己 → 游戏结束
    if(head.x<0||head.x>=20||head.y<0||head.y>=20 || 
       barriers.some(b=>b.x===head.x&&b.y===head.y) ||
       hitSelf) {
        end();
        return;
    }

    // 40分解锁传送门
    if(score>=40) showPortal=true;

    // 传送门逻辑（整条蛇瞬移）
    if(showPortal && head.x==portal.x&&head.y==portal.y){
        if(map==1){
            map=2; bg="#fff3e0";
            barriers=[{x:8,y:8},{x:2,y:12},{x:17,y:5}];
            portal={x:2,y:18};
            document.getElementById("map").innerText="地图：沙漠";
        }else{
            map=1; bg="#e8f5e9";
            barriers=[{x:3,y:3},{x:10,y:2},{x:16,y:16}];
            portal={x:18,y:18};
            document.getElementById("map").innerText="地图：森林";
        }
        // 整条蛇瞬移，尾巴不脱节
        snake=snake.map((_,i)=>({x:10-i*dx, y:10-i*dy}));
        head={x:10,y:10};
        showPortal=false;
        makeFood();
    }

    // 添加新蛇头
    snake.unshift(head);

    // 吃食物加分
    if(head.x==food.x&&head.y==food.y){
        score+=10;
        document.getElementById("score").innerText="得分："+score;
        makeFood();
    }else{
        snake.pop();
    }

    draw();
}

// 游戏结束
function end(){
    run=false; 
    clearInterval(loop); // 停止定时器
    document.getElementById("over").style.display="block";
}

// 电脑方向键控制
document.addEventListener("keydown",e=>{
    if(!run)return;
    if(e.key=="ArrowUp"&&dy!=1) {dx=0;dy=-1;}
    if(e.key=="ArrowDown"&&dy!=-1) {dx=0;dy=1;}
    if(e.key=="ArrowLeft"&&dx!=1) {dx=-1;dy=0;}
    if(e.key=="ArrowRight"&&dx!=-1) {dx=1;dy=0;}
});

// 手机滑动控制（强化适配）
let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
    e.preventDefault(); // 禁止默认滑动
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchmove",e=>{
    e.preventDefault(); // 彻底禁止页面滑动
},{passive:false});

canvas.addEventListener("touchend",e=>{
    if(!run)return;
    let x=e.changedTouches[0].clientX;
    let y=e.changedTouches[0].clientY;
    const diffX = x-sx;
    const diffY = y-sy;

    // 高灵敏度判定（5px即可触发）
    if(Math.abs(diffX)>Math.abs(diffY)){
        if(diffX>5&&dx!=-1) {dx=1;dy=0;}
        else if(diffX<-5&&dx!=1) {dx=-1;dy=0;}
    }else{
        if(diffY>5&&dy!=-1) {dx=0;dy=1;}
        else if(diffY<-5&&dy!=1) {dx=0;dy=-1;}
    }
},{passive:false});

// 绑定开始按钮（点击/触摸都生效）
document.getElementById("start").addEventListener("click", start);
document.getElementById("start").addEventListener("touchstart", (e)=>{
    e.preventDefault();
    start();
},{passive:false});
</script>
</body>
</html>
