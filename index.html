<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多地图贪吃蛇</title>
    <style>
        html, body {
            margin:0; padding:20px 0;
            text-align:center;
            background:#f0f0f0;
            overflow:hidden;
            touch-action:none;
        }
        #start {
            padding:10px 20px;
            font-size:18px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            margin-bottom:10px;
        }
        #tip {
            color:red; font-size:18px; display:none;
        }
        #score, #map {
            font-size:18px;
            margin:5px 0;
        }
        canvas {
            border:3px solid #333;
            width:90vw;
            max-width:400px;
            touch-action:none;
        }
    </style>
</head>
<body>
    <div id="tip">游戏结束</div>
    <div id="score">得分：0</div>
    <div id="map">地图：森林</div>
    <button id="start">开始游戏</button><br>
    <canvas id="c" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start');
        const scoreText = document.getElementById('score');
        const tip = document.getElementById('tip');
        const mapText = document.getElementById('map');

        const g = 20;
        let snake = [{x:5,y:5}];
        let food = {x:10,y:10};
        let dx=1, dy=0;
        let score=0;
        let run=false;
        let loop;

        // 地图1：森林（绿色）
        let map = 1;
        const barriers1 = [
            {x:3,y:3},{x:3,y:4},{x:3,y:5},
            {x:10,y:2},{x:11,y:2},{x:12,y:2},
            {x:16,y:16},{x:16,y:17}
        ];
        const portal1 = {x:18,y:18};

        // 地图2：沙漠（黄色）
        const barriers2 = [
            {x:8,y:8},{x:9,y:8},{x:10,y:8},
            {x:2,y:12},{x:2,y:13},{x:2,y:14},
            {x:17,y:5},{x:17,y:6}
        ];
        const portal2 = {x:2,y:18};

        let barriers = barriers1;
        let portal = portal1;

        // 生成食物
        function makeFood() {
            let f;
            do {
                f = {x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            } while (
                snake.some(s=>s.x==f.x&&s.y==f.y) ||
                barriers.some(b=>b.x==f.x&&b.y==f.y) ||
                (f.x==portal.x&&f.y==portal.y)
            );
            food = f;
        }

        // 画图
        function draw() {
            // 地图底色
            if(map==1){
                ctx.fillStyle="#e8f5e9"; // 森林绿
                mapText.innerText="地图：森林";
            }else{
                ctx.fillStyle="#fff3e0"; // 沙漠黄
                mapText.innerText="地图：沙漠";
            }
            ctx.fillRect(0,0,400,400);

            // 障碍：灰色
            ctx.fillStyle="#757575";
            barriers.forEach(b=>{
                ctx.fillRect(b.x*g, b.y*g, g-1, g-1);
            });

            // 传送门：黄色
            ctx.fillStyle="#ffc107";
            ctx.fillRect(portal.x*g, portal.y*g, g-1, g-1);

            // 食物：红色
            ctx.fillStyle="red";
            ctx.fillRect(food.x*g, food.y*g, g-1, g-1);

            // 蛇
            snake.forEach((s,i)=>{
                ctx.fillStyle=i==0?"darkgreen":"green";
                ctx.fillRect(s.x*g, s.y*g, g-1, g-1);
            });

            if(!run)return;

            let head = {x:snake[0].x+dx, y:snake[0].y+dy};

            // 撞墙/撞自己/撞障碍
            if(
                head.x<0||head.x>=20||head.y<0||head.y>=20 ||
                snake.some(s=>s.x==head.x&&s.y==head.y) ||
                barriers.some(b=>b.x==head.x&&b.y==head.y)
            ){
                run=false;
                tip.style.display="block";
                clearInterval(loop);
                return;
            }

            // 进传送门 → 切换地图
            if(head.x==portal.x&&head.y==portal.y){
                if(map==1){
                    map=2;
                    barriers=barriers2;
                    portal=portal2;
                    head.x=2; head.y=18;
                }else{
                    map=1;
                    barriers=barriers1;
                    portal=portal1;
                    head.x=18; head.y=18;
                }
                makeFood();
            }

            snake.unshift(head);

            // 吃食物
            if(head.x==food.x&&head.y==food.y){
                score+=10;
                scoreText.innerText="得分："+score;
                makeFood();
            }else{
                snake.pop();
            }
        }

        // 开始
        function start(){
            map=1; barriers=barriers1; portal=portal1;
            snake=[{x:5,y:5}];
            dx=1; dy=0;
            score=0;
            scoreText.innerText="得分：0";
            tip.style.display="none";
            run=true;
            makeFood();
            clearInterval(loop);
            loop=setInterval(draw,200);
        }

        // 电脑按键
        document.addEventListener("keydown",e=>{
            if(!run)return;
            if(e.key=="ArrowUp"&&dy!=1) {dx=0; dy=-1;}
            if(e.key=="ArrowDown"&&dy!=-1) {dx=0; dy=1;}
            if(e.key=="ArrowLeft"&&dx!=1) {dx=-1; dy=0;}
            if(e.key=="ArrowRight"&&dx!=-1) {dx=1; dy=0;}
        });

        // 手机滑动（灵敏）
        let sx=0,sy=0;
        canvas.addEventListener("touchstart",e=>{
            e.preventDefault();
            sx=e.touches[0].clientX;
            sy=e.touches[0].clientY;
        },{passive:false});

        canvas.addEventListener("touchmove",e=>{
            e.preventDefault();
        },{passive:false});

        canvas.addEventListener("touchend",e=>{
            if(!run)return;
            let x=e.changedTouches[0].clientX;
            let y=e.changedTouches[0].clientY;
            let dxm=x-sx, dym=y-sy;

            if(Math.abs(dxm)>Math.abs(dym)){
                if(dxm>0&&dx!=-1) {dx=1; dy=0;}
                else if(dxm<0&&dx!=1) {dx=-1; dy=0;}
            }else{
                if(dym>0&&dy!=-1) {dx=0; dy=1;}
                else if(dym<0&&dy!=1) {dx=0; dy=-1;}
            }
        },{passive:false});

        startBtn.onclick=start;
        draw();
    </script>
</body>
</html>
