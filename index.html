<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f0f0;
            padding: 20px 0;
        }
        #start {
            padding: 12px 25px;
            font-size: 18px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        #score {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #gameOver {
            font-size: 18px;
            color: red;
            margin-bottom: 10px;
            display: none;
        }
        canvas {
            width: 90vw;
            max-width: 400px;
            border: 3px solid #333;
            background: white;
        }
        #tips {
            margin-top: 10px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="gameOver">游戏结束！点开始重新玩</div>
    <div id="score">得分：0</div>
    <button id="start">开始游戏</button>
    <canvas id="snake" width="400" height="400"></canvas>
    <div id="tips">手机：在白色区域滑动<br>电脑：方向键</div>

    <script>
        const canvas = document.getElementById('snake');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start');
        const scoreText = document.getElementById('score');
        const gameOverText = document.getElementById('gameOver');

        const grid = 20;
        let snake = [{x:10, y:10}];
        let food = {x:5, y:5};
        let dx=0, dy=0;
        let score = 0;
        let running = false;
        let loop;

        function randomFood() {
            return {
                x: Math.floor(Math.random()*20),
                y: Math.floor(Math.random()*20)
            };
        }

        function draw() {
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,400,400);

            // 食物
            ctx.fillStyle = "red";
            ctx.fillRect(food.x*grid, food.y*grid, grid-1, grid-1);

            // 蛇
            for(let i=0;i<snake.length;i++){
                ctx.fillStyle = i===0 ? "#2e7d32" : "#4caf50";
                ctx.fillRect(snake[i].x*grid, snake[i].y*grid, grid-1, grid-1);
            }

            if(!running) return;

            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 撞墙/撞自己
            if(head.x<0 || head.x>=20 || head.y<0 || head.y>=20 ||
               snake.some(s=>s.x===head.x && s.y===head.y)){
                stop();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if(head.x===food.x && head.y===food.y){
                score +=10;
                scoreText.innerText = "得分："+score;
                food = randomFood();
            }else{
                snake.pop();
            }
        }

        function start(){
            snake = [{x:10,y:10}];
            food = randomFood();
            dx=1; dy=0;
            score=0;
            scoreText.innerText="得分：0";
            running=true;
            gameOverText.style.display="none";
            clearInterval(loop);
            loop = setInterval(draw,200);
        }

        function stop(){
            running=false;
            clearInterval(loop);
            gameOverText.style.display="block";
        }

        // 电脑按键
        document.addEventListener("keydown", e=>{
            if(!running) return;
            if(e.key==="ArrowUp" && dy!==1) {dx=0; dy=-1;}
            if(e.key==="ArrowDown" && dy!==-1) {dx=0; dy=1;}
            if(e.key==="ArrowLeft" && dx!==1) {dx=-1; dy=0;}
            if(e.key==="ArrowRight" && dx!==-1) {dx=1; dy=0;}
        });

        // 手机滑动
        let tx=0,ty=0;
        canvas.addEventListener("touchstart", e=>{
            tx = e.touches[0].clientX;
            ty = e.touches[0].clientY;
        });
        canvas.addEventListener("touchend", e=>{
            if(!running) return;
            let x = e.changedTouches[0].clientX;
            let y = e.changedTouches[0].clientY;
            let dxm = x-tx;
            let dym = y-ty;

            if(Math.abs(dxm)>Math.abs(dym)){
                if(dxm>0 && dx!==-1) {dx=1; dy=0;}
                else if(dxm<0 && dx!==1) {dx=-1; dy=0;}
            }else{
                if(dym>0 && dy!==-1) {dx=0; dy=1;}
                else if(dym<0 && dy!==1) {dx=0; dy=-1;}
            }
        });

        startBtn.onclick = start;
        draw();
    </script>
</body>
</html>
