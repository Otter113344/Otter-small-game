<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇完美版</title>
    <style>
        html,body{margin:0;padding:20px 0;text-align:center;background:#fff;overflow:hidden;touch-action:none}
        #start{padding:10px 20px;font-size:18px;background:green;color:white;border:none;border-radius:8px}
        #over{color:red;font-size:18px;display:none}
        #score,#map{font-size:18px;margin:5px 0}
        canvas{border:3px solid #000;width:90vw;max-width:400px;touch-action:none}
    </style>
</head>
<body>
    <div id="over">游戏结束</div>
    <div id="score">得分：0</div>
    <div id="map">地图：森林</div>
    <button id="start">开始游戏</button><br>
    <canvas id="c" width="400" height="400"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const g=20;

let map,bg,barriers,portal,showPortal;
let snake,food,dx,dy,score,run,loop;

function draw(){
    ctx.fillStyle=bg;ctx.fillRect(0,0,400,400);
    ctx.fillStyle="#777";barriers.forEach(b=>{ctx.fillRect(b.x*g,b.y*g,g-1,g-1)});
    if(showPortal){ctx.fillStyle="yellow";ctx.fillRect(portal.x*g,portal.y*g,g-1,g-1)}
    ctx.fillStyle="red";ctx.fillRect(food.x*g,food.y*g,g-1,g-1);
    snake.forEach((s,i)=>{
        let x=s.x*g,y=s.y*g;
        if(i==0){
            ctx.fillStyle="#006600";ctx.beginPath();ctx.arc(x+10,y+10,9,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="white";ctx.fillRect(x+6,y+6,3,3);ctx.fillRect(x+11,y+6,3,3);
            ctx.strokeStyle="black";ctx.beginPath();ctx.arc(x+10,y+12,4,0,Math.PI);ctx.stroke();
        }else{
            ctx.fillStyle="green";ctx.fillRect(x,y,g-1,g-1);
        }
    });
}

function makeFood(){
    let f;
    do{f={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
    }while(snake.some(s=>s.x==f.x&&s.y==f.y)||barriers.some(b=>b.x==f.x&&b.y==f.y)||(f.x==portal.x&&f.y==portal.y));
    food=f;
}

function resetMap1(){
    map=1;bg="#e8f5e9";barriers=[{x:3,y:3},{x:10,y:2},{x:16,y:16}];portal={x:18,y:18};showPortal=false;
    document.getElementById("map").innerText="地图：森林";
}

function start(){
    clearInterval(loop);
    resetMap1();
    snake=[{x:5,y:5}];dx=1;dy=0;score=0;run=true;
    document.getElementById("score").innerText="得分：0";
    document.getElementById("over").style.display="none";
    makeFood();
    loop=setInterval(game,200);
    draw();
}

function game(){
    let head={x:snake[0].x+dx,y:snake[0].y+dy};
    let hitWall=head.x<0||head.x>=20||head.y<0||head.y>=20;
    let hitBarrier=barriers.some(b=>b.x==head.x&&b.y==head.y);
    let hitSelf=snake.slice(1).some(s=>s.x==head.x&&s.y==head.y);
    if(hitWall||hitBarrier||hitSelf){end();return;}
    if(score>=40)showPortal=true;
    if(showPortal&&head.x==portal.x&&head.y==portal.y){
        if(map==1){map=2;bg="#fff3e0";barriers=[{x:8,y:8},{x:2,y:12},{x:17,y:5}];portal={x:2,y:18};
        document.getElementById("map").innerText="地图：沙漠";}
        else{resetMap1();}
        snake=snake.map((_,i)=>({x:10-i*dx,y:10-i*dy}));
        head={x:10,y:10};showPortal=false;makeFood();
    }
    snake.unshift(head);
    if(head.x==food.x&&head.y==food.y){score+=10;document.getElementById("score").innerText="得分："+score;makeFood();}
    else{snake.pop();}
    draw();
}

function end(){run=false;clearInterval(loop);document.getElementById("over").style.display="block";}

document.addEventListener("keydown",e=>{
    if(!run)return;
    if(e.key=="ArrowUp"&&dy!=1){dx=0;dy=-1;}
    if(e.key=="ArrowDown"&&dy!=-1){dx=0;dy=1;}
    if(e.key=="ArrowLeft"&&dx!=1){dx=-1;dy=0;}
    if(e.key=="ArrowRight"&&dx!=-1){dx=1;dy=0;}
});

let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{e.preventDefault();sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:false});
canvas.addEventListener("touchmove",e=>{e.preventDefault();},{passive:false});
canvas.addEventListener("touchend",e=>{
    if(!run)return;
    let x=e.changedTouches[0].clientX,y=e.changedTouches[0].clientY;
    if(Math.abs(x-sx)>Math.abs(y-sy)){
        if(x-sx>5&&dx!=-1){dx=1;dy=0;}else if(dx!=1){dx=-1;dy=0;}
    }else{
        if(y-sy>5&&dy!=-1){dx=0;dy=1;}else if(dy!=1){dx=0;dy=-1;}
    }
},{passive:false});

document.getElementById("start").onclick=start;
resetMap1();draw();
</script>
</body>
</html>
