<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 强化手机适配，禁止所有默认触摸行为 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>手机版贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none; /* 禁止iOS长按菜单 */
            -webkit-user-select: none; /* 禁止文本选择 */
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            overflow: hidden; /* 禁止页面整体滚动 */
        }
        #startBtn {
            padding: 12px 35px;
            font-size: 20px;
            background-color: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; /* 去除手机点击高亮 */
        }
        #startBtn:active {
            background-color: #1B5E20;
        }
        #score {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #e63946;
        }
        /* 固定画布尺寸比例，避免手机端坐标错乱 */
        .canvas-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1/1; /* 保证画布正方形 */
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            border: 3px solid #333;
            background-color: #fff;
            display: block; /* 消除画布默认空隙 */
        }
        #operateTip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
            text-align: center;
            pointer-events: none;
            width: 80%;
        }
        #tips {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>
    <button id="startBtn">开始游戏</button>
    <div id="score">得分：0</div>
    <div class="canvas-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="operateTip">↓ 在此区域内滑动控制方向 ↓</div>
    </div>
    <div id="tips">手机：在画布内滑动 | 电脑：方向键控制 | 撞墙/撞自己结束</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const operateTip = document.getElementById('operateTip');

        // 固定格子尺寸，避免手机端计算错误
        const gridSize = 20;
        const canvasSize = 400; // 画布固定尺寸
        const tileCount = canvasSize / gridSize; // 固定格子数，避免适配错乱

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop = null;
        let touchStartX = 0;
        let touchStartY = 0;
        let isGameRunning = false;
        let isAlertShowing = false; // 防止重复弹窗

        // 初始化游戏（仅重置，不启动）
        function initGame() {
            if (isAlertShowing) return; // 避免弹窗时重复初始化
            snake = [{ x: 10, y: 10 }]; // 固定初始位置，确保在画布内
            food = randomFood();
            dx = 0;
            dy = 0;
            score = 0;
            updateScore();
            isGameRunning = false;
            operateTip.style.display = 'block';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            drawGame();
        }

        // 启动游戏（确保蛇缓慢启动，避免瞬间撞墙）
        function startGame() {
            if (isGameRunning || isAlertShowing) return;
            isGameRunning = true;
            operateTip.style.display = 'none';
            dx = 1; // 初始向右，速度可控
            if (!gameLoop) {
                gameLoop = setInterval(drawGame, 200); // 降低速度，更易操作
            }
        }

        // 生成食物（确保在画布内）
        function randomFood() {
            let newFood;
            while (!newFood || snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
                newFood = {
                    x: Math.floor(Math.random() * (tileCount - 2)) + 1, // 避开边缘
                    y: Math.floor(Math.random() * (tileCount - 2)) + 1
                };
            }
            return newFood;
        }

        function updateScore() {
            scoreElement.textContent = `得分：${score}`;
        }

        function drawGame() {
            if (!isGameRunning) return;

            // 清画布
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            // 移动蛇头（先判定是否出界，再移动）
            const newHeadX = snake[0].x + dx;
            const newHeadY = snake[0].y + dy;

            // 严格判定撞墙/撞自己（避免误判）
            if (
                newHeadX < 0 || newHeadX >= tileCount ||
                newHeadY < 0 || newHeadY >= tileCount ||
                snake.some(segment => segment.x === newHeadX && segment.y === newHeadY && segment !== snake[0])
            ) {
                gameOver();
                return;
            }

            // 正常移动蛇
            snake.unshift({ x: newHeadX, y: newHeadY });

            // 吃到食物
            if (newHeadX === food.x && newHeadY === food.y) {
                score += 10;
                updateScore();
                food = randomFood();
            } else {
                snake.pop();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#2E7D32' : '#4CAF50';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // 绘制食物
            ctx.fillStyle = '#e63946';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        // 游戏结束逻辑（防重复弹窗）
        function gameOver() {
            if (isAlertShowing) return;
            isAlertShowing = true;
            clearInterval(gameLoop);
            gameLoop = null;
            isGameRunning = false;

            // 延迟弹窗，避免瞬间触发
            setTimeout(() => {
                alert(`游戏结束！最终得分：${score}\n点击确定重新准备`);
                isAlertShowing = false;
                initGame();
            }, 100);
        }

        // 电脑方向键控制（仅游戏运行时生效）
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning || isAlertShowing) return;
            e.preventDefault(); // 阻止方向键滚动页面
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });

        // 手机触摸控制（彻底阻止默认行为）
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻止所有触摸默认行为
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false }); // 强制允许preventDefault

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 阻止滑动时页面滚动
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning || isAlertShowing) return;
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // 增加滑动阈值，避免误触（至少滑动15px才判定方向）
            if (Math.abs(diffX) > 15 || Math.abs(diffY) > 15) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 15 && dx !== -1) { dx = 1; dy = 0; }
                    if (diffX < -15 && dx !== 1) { dx = -1; dy = 0; }
                } else {
                    if (diffY > 15 && dy !== -1) { dx = 0; dy = 1; }
                    if (diffY < -15 && dy !== 1) { dx = 0; dy = -1; }
                }
            }
        }, { passive: false });

        // 绑定开始按钮（手机点击无延迟）
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });

        // 页面加载初始化
        window.onload = () => {
            initGame();
            // 禁止页面整体触摸滚动
            document.body.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        };
    </script>
</body>
</html>
