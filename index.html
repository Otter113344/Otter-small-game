<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手机版贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #startBtn {
            padding: 10px 30px;
            font-size: 20px;
            background-color: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            touch-action: manipulation;
        }
        #startBtn:active {
            background-color: #1B5E20;
        }
        #score {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #e63946;
        }
        /* 游戏画布：标注操作范围，适配手机 */
        #gameCanvas {
            border: 3px solid #333;
            background-color: #fff;
            width: 90vw;
            height: auto;
            max-width: 400px;
            position: relative;
        }
        /* 操作范围提示（仅初始显示） */
        #operateTip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
            text-align: center;
            pointer-events: none; /* 不影响滑动操作 */
        }
        #tips {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <button id="startBtn">开始游戏</button>
    <div id="score">得分：0</div>
    <!-- 画布+操作范围提示 -->
    <div style="position: relative;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="operateTip">↓ 在此区域内滑动控制方向 ↓</div>
    </div>
    <div id="tips">手机：在画布内滑动 | 电脑：方向键控制 | 撞墙/撞自己结束</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const operateTip = document.getElementById('operateTip');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0; // 初始方向为0，不移动
        let dy = 0;
        let score = 0;
        let gameLoop;
        let touchStartX = 0;
        let touchStartY = 0;
        let isGameRunning = false; // 标记游戏是否运行

        // 初始化游戏（仅重置数据，不启动）
        function initGame() {
            snake = [{ x: 10, y: 10 }];
            food = randomFood();
            dx = 0;
            dy = 0;
            score = 0;
            updateScore();
            isGameRunning = false;
            operateTip.style.display = 'block'; // 显示操作范围提示
            if (gameLoop) clearInterval(gameLoop);
            drawGame(); // 绘制初始界面
        }

        // 启动游戏
        function startGame() {
            if (isGameRunning) return; // 避免重复点击
            isGameRunning = true;
            operateTip.style.display = 'none'; // 隐藏操作提示
            dx = 1; // 开始后默认向右移动
            gameLoop = setInterval(drawGame, 150);
        }

        function randomFood() {
            let newFood;
            while (!newFood || snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            }
            return newFood;
        }

        function updateScore() {
            scoreElement.textContent = `得分：${score}`;
        }

        function drawGame() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // 撞墙/撞自己，结束游戏
            if (
                head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount ||
                snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                clearInterval(gameLoop);
                isGameRunning = false;
                alert(`游戏结束！最终得分：${score}\n点击确定重新准备`);
                initGame(); // 重置游戏，回到初始状态
                return;
            }

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                food = randomFood();
            } else {
                snake.pop();
            }

            // 绘制蛇
            ctx.fillStyle = '#4CAF50';
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#2E7D32' : '#4CAF50';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // 绘制食物
            ctx.fillStyle = '#e63946';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return; // 没开始游戏时，方向键无效
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });

        // 手机滑动控制（仅在画布内有效）
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        });

        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning) return; // 没开始游戏时，滑动无效
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 20 && dx !== -1) { dx = 1; dy = 0; }
                if (diffX < -20 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (diffY > 20 && dy !== -1) { dx = 0; dy = 1; }
                if (diffY < -20 && dy !== 1) { dx = 0; dy = -1; }
            }
            e.preventDefault();
        });

        // 绑定开始按钮点击事件
        startBtn.addEventListener('click', startGame);

        // 页面加载时初始化游戏
        window.onload = initGame;
    </script>
</body>
</html>
