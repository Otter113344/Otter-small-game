<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇地图版</title>
    <style>
        html, body {
            margin:0; padding:20px 0;
            text-align:center;
            background:#fff;
            overflow:hidden;
            touch-action:none;
        }
        #start {
            padding:10px 20px;
            font-size:18px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
        }
        #tip { color:red; font-size:18px; display:none; }
        #score, #map { font-size:18px; margin:5px 0; }
        canvas {
            border:3px solid #000;
            width:90vw;
            max-width:400px;
            touch-action:none;
        }
    </style>
</head>
<body>
    <div id="tip">游戏结束</div>
    <div id="score">得分：0</div>
    <div id="map">地图：森林</div>
    <button id="start">开始游戏</button><br>
    <canvas id="c" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const grid = 20;

        // 地图数据
        let currentMap = 1;
        let bgColor = "#e8f5e9";
        let barriers = [
            {x:3,y:3},{x:3,y:4},{x:3,y:5},
            {x:10,y:2},{x:11,y:2},{x:12,y:2},
            {x:16,y:16},{x:16,y:17}
        ];
        let portal = {x:18,y:18};
        let portalUnlocked = false; // ✅ 传送门是否解锁（40分才开）

        let snake = [{x:5,y:5}];
        let food = {x:10,y:10};
        let dx=1, dy=0;
        let score=0;
        let isRunning = false;
        let gameLoop;

        drawGame();

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x:Math.floor(Math.random()*20),
                    y:Math.floor(Math.random()*20)
                };
                const hitBarrier = barriers.some(b => b.x === newFood.x && b.y === newFood.y);
                const hitSnake = snake.some(s => s.x === newFood.x && s.y === newFood.y);
                const hitPortal = newFood.x === portal.x && newFood.y === portal.y;
                if(!hitBarrier && !hitSnake && !hitPortal) break;
            } while(true);
            food = newFood;
        }

        // ✅ 绘制游戏（40分才显示传送门）
        function drawGame() {
            ctx.fillStyle = bgColor;
            ctx.fillRect(0,0,400,400);

            ctx.fillStyle = "#777";
            barriers.forEach(b => {
                ctx.fillRect(b.x*grid, b.y*grid, grid-1, grid-1);
            });

            // ✅ 只有解锁后才画传送门
            if(portalUnlocked) {
                ctx.fillStyle = "#ff0";
                ctx.fillRect(portal.x*grid, portal.y*grid, grid-1, grid-1);
            }

            ctx.fillStyle = "red";
            ctx.fillRect(food.x*grid, food.y*grid, grid-1, grid-1);

            // 笑脸蛇头
            snake.forEach((segment, index) => {
                const x = segment.x * grid;
                const y = segment.y * grid;
                if(index === 0) {
                    ctx.fillStyle = "#004d00";
                    ctx.beginPath();
                    ctx.arc(x+grid/2, y+grid/2, grid/2-1, 0, Math.PI*2);
                    ctx.fill();

                    ctx.fillStyle = "white";
                    ctx.fillRect(x+5, y+5, 2, 2);
                    ctx.fillRect(x+13, y+5, 2, 2);
                    ctx.fillStyle = "black";
                    ctx.fillRect(x+6, y+6, 1, 1);
                    ctx.fillRect(x+14, y+6, 1, 1);

                    ctx.strokeStyle = "black";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(x+10, y+9, 4, 0, Math.PI);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = "#0a0";
                    ctx.fillRect(x, y, grid-1, grid-1);
                }
            });
        }

        function startGame() {
            currentMap = 1;
            bgColor = "#e8f5e9";
            barriers = [
                {x:3,y:3},{x:3,y:4},{x:3,y:5},
                {x:10,y:2},{x:11,y:2},{x:12,y:2},
                {x:16,y:16},{x:16,y:17}
            ];
            portal = {x:18,y:18};
            portalUnlocked = false; // ✅ 一开始传送门锁住
            document.getElementById("map").innerText = "地图：森林";

            snake = [{x:5,y:5}];
            dx=1; dy=0;
            score=0;
            document.getElementById("score").innerText = "得分：0";
            document.getElementById("tip").style.display = "none";

            isRunning = true;
            generateFood();
            clearInterval(gameLoop);
            gameLoop = setInterval(updateGame, 200);
        }

        function updateGame() {
            let newHead = {x: snake[0].x + dx, y: snake[0].y + dy};

            const hitWall = newHead.x < 0 || newHead.x >= 20 || newHead.y < 0 || newHead.y >= 20;
            const hitBarrier = barriers.some(b => b.x === newHead.x && b.y === newHead.y);
            if(hitWall || hitBarrier) {
                isRunning = false;
                clearInterval(gameLoop);
                document.getElementById("tip").style.display = "block";
                return;
            }

            // ✅ 得分 ≥40 才解锁传送门
            if(score >= 40) {
                portalUnlocked = true;
            }

            // ✅ 只有解锁了，才能进传送门
            if(portalUnlocked && newHead.x === portal.x && newHead.y === portal.y) {
                if(currentMap === 1) {
                    currentMap = 2;
                    bgColor = "#fff3e0";
                    barriers = [{x:8,y:8},{x:9,y:8},{x:10,y:8},{x:2,y:12},{x:17,y:5}];
                    portal = {x:2,y:18};
                    document.getElementById("map").innerText = "地图：沙漠";
                } else {
                    currentMap = 1;
                    bgColor = "#e8f5e9";
                    barriers = [{x:3,y:3},{x:3,y:4},{x:10,y:2},{x:16,y:16}];
                    portal = {x:18,y:18};
                    document.getElementById("map").innerText = "地图：森林";
                }

                // 整条蛇一起瞬移
                const nx = 10, ny = 10;
                snake = snake.map((_, idx) => ({
                    x: nx - idx*dx,
                    y: ny - idx*dy
                }));
                newHead = {x:nx, y:ny};
                portalUnlocked = false; // ✅ 切换地图后重新锁住
                generateFood();
            }

            snake.unshift(newHead);

            if(newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "得分：" + score;
                generateFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        // 电脑按键
        document.addEventListener("keydown", e=>{
            if(!isRunning) return;
            if(e.key === "ArrowUp" && dy !== 1) { dx=0; dy=-1; }
            if(e.key === "ArrowDown" && dy !== -1) { dx=0; dy=1; }
            if(e.key === "ArrowLeft" && dx !== 1) { dx=-1; dy=0; }
            if(e.key === "ArrowRight" && dx !== -1) { dx=1; dy=0; }
        });

        // 手机滑动
        let sx=0,sy=0;
        canvas.addEventListener("touchstart", e=>{
            e.preventDefault();
            sx = e.touches[0].clientX;
            sy = e.touches[0].clientY;
        },{passive:false});
        canvas.addEventListener("touchmove", e=>{
            e.preventDefault();
        },{passive:false});
        canvas.addEventListener("touchend", e=>{
            if(!isRunning) return;
            let x = e.changedTouches[0].clientX;
            let y = e.changedTouches[0].clientY;
            if(Math.abs(x-sx) > Math.abs(y-sy)){
                if(x-sx>0 && dx!==-1) {dx=1;dy=0;}
                else if(dx!==1) {dx=-1;dy=0;}
            }else{
                if(y-sy>0 && dy!==-1) {dx=0;dy=1;}
                else if(dy!==1) {dx=0;dy=-1;}
            }
        },{passive:false});

        document.getElementById("start").onclick = startGame;
    </script>
</body>
</html>
