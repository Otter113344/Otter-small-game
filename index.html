<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机适配核心，必须保留 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手机版贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        /* 游戏画布：适配手机屏幕，最大宽度不超屏幕 */
        #gameCanvas {
            border: 2px solid #333;
            background-color: #fff;
            width: 90vw; /* 占屏幕宽度90% */
            height: auto; /* 高度自动适配，保持比例 */
            max-width: 400px; /* 电脑端最大宽度，避免太大 */
        }
        #score {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #e63946;
        }
        #tips {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="score">得分：0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="tips">手机：滑动屏幕控制方向 | 电脑：方向键控制</div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 游戏配置（适配手机）
        const gridSize = 20; // 格子大小
        const tileCount = canvas.width / gridSize; // 格子数量
        let snake = [{ x: 10, y: 10 }]; // 蛇初始位置
        let food = { x: 5, y: 5 }; // 食物初始位置
        let dx = 0; // 水平移动方向
        let dy = 0; // 垂直移动方向
        let score = 0;
        let gameLoop; // 游戏循环
        let touchStartX = 0;
        let touchStartY = 0;

        // 初始化游戏
        function initGame() {
            snake = [{ x: 10, y: 10 }];
            food = randomFood();
            dx = 0;
            dy = 0;
            score = 0;
            updateScore();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(drawGame, 150); // 游戏帧率
        }

        // 生成随机食物（不落在蛇身上）
        function randomFood() {
            let newFood;
            while (!newFood || snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            }
            return newFood;
        }

        // 更新得分
        function updateScore() {
            scoreElement.textContent = `得分：${score}`;
        }

        // 绘制游戏
        function drawGame() {
            // 清画布
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 移动蛇
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // 撞墙/撞自己，游戏结束
            if (
                head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount ||
                snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                clearInterval(gameLoop);
                alert(`游戏结束！最终得分：${score}\n点击确定重新开始`);
                initGame();
                return;
            }

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                food = randomFood();
            } else {
                snake.pop(); // 没吃到食物，蛇尾前进
            }

            // 绘制蛇
            ctx.fillStyle = '#4CAF50';
            snake.forEach((segment, index) => {
                // 蛇头颜色区分
                ctx.fillStyle = index === 0 ? '#2E7D32' : '#4CAF50';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // 绘制食物
            ctx.fillStyle = '#e63946';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        // 键盘控制（电脑端）
        document.addEventListener('keydown', (e) => {
            // 防止反向移动
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });

        // 触摸滑动控制（手机端）
        canvas.addEventListener('touchstart', (e) => {
            // 记录触摸起始位置
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault(); // 防止页面滑动
        });

        canvas.addEventListener('touchend', (e) => {
            // 计算滑动距离
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // 判断滑动方向（优先水平/垂直）
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // 左右滑动
                if (diffX > 20 && dx !== -1) { dx = 1; dy = 0; } // 右
                if (diffX < -20 && dx !== 1) { dx = -1; dy = 0; } // 左
            } else {
                // 上下滑动
                if (diffY > 20 && dy !== -1) { dx = 0; dy = 1; } // 下
                if (diffY < -20 && dy !== 1) { dx = 0; dy = -1; } // 上
            }
            e.preventDefault();
        });

        // 启动游戏
        initGame();
    </script>
</body>
