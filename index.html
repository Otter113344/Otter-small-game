<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇最终版</title>
    <style>
        html,body{
            margin:0; padding:20px 0; text-align:center;
            background:#fff; overflow:hidden; touch-action:none;
        }
        #start-btn{ /* 按钮单独命名，避免冲突 */
            padding:12px 30px; font-size:18px; 
            background:#2e7d32; color:white; border:none; border-radius:8px;
            cursor: pointer; /* 电脑显示手型 */
            touch-action: manipulation; /* 手机点击更灵敏 */
        }
        #game-over{color:red; font-size:18px; display:none;}
        #score,#map{font-size:18px; margin:5px 0;}
        canvas{
            border:3px solid #000; width:90vw; max-width:400px; 
            touch-action:none;
        }
    </style>
</head>
<body>
    <div id="game-over">游戏结束</div>
    <div id="score">得分：0</div>
    <div id="map">地图：森林</div>
    <button id="start-btn">开始游戏</button><br>
    <canvas id="game-canvas" width="400" height="400"></canvas>

<script>
// 核心元素（明确命名，避免获取失败）
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const gameOverText = document.getElementById('game-over');
const scoreText = document.getElementById('score');
const mapText = document.getElementById('map');
const grid = 20;

// 全局状态（初始化所有变量）
let map = 1;
let bgColor = "#e8f5e9";
let barriers = [{x:3,y:3},{x:10,y:2},{x:16,y:16}];
let portal = {x:18,y:18};
let portalShow = false;

let snake = [{x:5,y:5}];
let food = {x:10,y:10};
let dx = 1, dy = 0;
let score = 0;
let isRunning = false;
let gameTimer = null;

// ========== 核心修复：强制绑定按钮事件 ==========
// 电脑点击 + 手机触摸 都绑定
startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchstart', function(e) {
    e.preventDefault(); // 阻止默认触摸行为
    startGame();
}, {passive: false});

// 初始化绘制
drawGame();

// 绘制函数
function drawGame() {
    // 1. 背景
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, 400, 400);

    // 2. 障碍
    ctx.fillStyle = "#777";
    barriers.forEach(b => {
        ctx.fillRect(b.x*grid, b.y*grid, grid-1, grid-1);
    });

    // 3. 传送门（40分显示）
    if(portalShow) {
        ctx.fillStyle = "yellow";
        ctx.fillRect(portal.x*grid, portal.y*grid, grid-1, grid-1);
    }

    // 4. 食物
    ctx.fillStyle = "red";
    ctx.fillRect(food.x*grid, food.y*grid, grid-1, grid-1);

    // 5. 笑脸蛇头+蛇身
    snake.forEach((s, i) => {
        let x = s.x*grid, y = s.y*grid;
        if(i === 0) {
            // 笑脸头
            ctx.fillStyle = "#006600";
            ctx.beginPath();
            ctx.arc(x+10, y+10, 9, 0, Math.PI*2);
            ctx.fill();
            // 眼睛
            ctx.fillStyle = "white";
            ctx.fillRect(x+6, y+6, 3, 3);
            ctx.fillRect(x+11, y+6, 3, 3);
            // 嘴巴
            ctx.strokeStyle = "black";
            ctx.beginPath();
            ctx.arc(x+10, y+12, 4, 0, Math.PI);
            ctx.stroke();
        } else {
            ctx.fillStyle = "green";
            ctx.fillRect(x, y, grid-1, grid-1);
        }
    });
}

// 生成食物
function createFood() {
    let newFood;
    do {
        newFood = {
            x: Math.floor(Math.random()*20),
            y: Math.floor(Math.random()*20)
        };
        // 避开蛇、障碍、传送门
        const hitSnake = snake.some(s => s.x === newFood.x && s.y === newFood.y);
        const hitBar = barriers.some(b => b.x === newFood.x && b.y === newFood.y);
        const hitPortal = newFood.x === portal.x && newFood.y === portal.y;
        if(!hitSnake && !hitBar && !hitPortal) break;
    } while(true);
    food = newFood;
}

// ========== 核心修复：startGame函数强制重置所有状态 ==========
function startGame() {
    // 1. 强制停止旧定时器（关键！）
    clearInterval(gameTimer);
    
    // 2. 重置地图
    map = 1;
    bgColor = "#e8f5e9";
    barriers = [{x:3,y:3},{x:10,y:2},{x:16,y:16}];
    portal = {x:18,y:18};
    portalShow = false;
    mapText.innerText = "地图：森林";

    // 3. 重置蛇
    snake = [{x:5,y:5}];
    dx = 1;
    dy = 0;

    // 4. 重置得分和状态
    score = 0;
    scoreText.innerText = "得分：0";
    gameOverText.style.display = "none";
    isRunning = true;

    // 5. 生成新食物 + 启动新定时器
    createFood();
    gameTimer = setInterval(updateGame, 200);
    
    // 6. 立即绘制新界面
    drawGame();
}

// 游戏逻辑
function updateGame() {
    let head = {x: snake[0].x + dx, y: snake[0].y + dy};

    // 撞墙/撞障碍/撞自己 → 结束
    const hitWall = head.x<0 || head.x>=20 || head.y<0 || head.y>=20;
    const hitBar = barriers.some(b => b.x === head.x && b.y === head.y);
    const hitSelf = snake.slice(1).some(s => s.x === head.x && s.y === head.y); // 跳过蛇头

    if(hitWall || hitBar || hitSelf) {
        isRunning = false;
        clearInterval(gameTimer);
        gameOverText.style.display = "block";
        return;
    }

    // 40分解锁传送门
    if(score >= 40) portalShow = true;

    // 传送门逻辑
    if(portalShow && head.x === portal.x && head.y === portal.y) {
        if(map === 1) {
            map = 2;
            bgColor = "#fff3e0";
            barriers = [{x:8,y:8},{x:2,y:12},{x:17,y:5}];
            portal = {x:2,y:18};
            mapText.innerText = "地图：沙漠";
        } else {
            map = 1;
            bgColor = "#e8f5e9";
            barriers = [{x:3,y:3},{x:10,y:2},{x:16,y:16}];
            portal = {x:18,y:18};
            mapText.innerText = "地图：森林";
        }
        // 整条蛇瞬移
        snake = snake.map((_,i) => ({x:10 - i*dx, y:10 - i*dy}));
        head = {x:10, y:10};
        portalShow = false;
        createFood();
    }

    // 移动蛇
    snake.unshift(head);
    if(head.x === food.x && head.y === food.y) {
        score += 10;
        scoreText.innerText = "得分：" + score;
        createFood();
    } else {
        snake.pop();
    }

    drawGame();
}

// 电脑方向键
document.addEventListener('keydown', function(e) {
    if(!isRunning) return;
    if(e.key === "ArrowUp" && dy !== 1) {dx=0; dy=-1;}
    if(e.key === "ArrowDown" && dy !== -1) {dx=0; dy=1;}
    if(e.key === "ArrowLeft" && dx !== 1) {dx=-1; dy=0;}
    if(e.key === "ArrowRight" && dx !== -1) {dx=1; dy=0;}
});

// 手机滑动
let touchX = 0, touchY = 0;
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', function(e) {
    if(!isRunning) return;
    let x = e.changedTouches[0].clientX;
    let y = e.changedTouches[0].clientY;
    const diffX = x - touchX;
    const diffY = y - touchY;

    if(Math.abs(diffX) > Math.abs(diffY)) {
        if(diffX > 5 && dx !== -1) dx=1, dy=0;
        else if(diffX < -5 && dx !== 1) dx=-1, dy=0;
    } else {
        if(diffY > 5 && dy !== -1) dx=0, dy=1;
        else if(diffY < -5 && dy !== 1) dx=0, dy=-1;
    }
}, {passive: false});
</script>
</body>
</html>
