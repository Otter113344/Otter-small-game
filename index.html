<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇地图版</title>
    <style>
        html, body {
            margin:0; padding:20px 0;
            text-align:center;
            background:#fff;
            overflow:hidden;
            touch-action:none;
        }
        #start {
            padding:10px 20px;
            font-size:18px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
        }
        #tip { color:red; font-size:18px; display:none; }
        #score, #map { font-size:18px; margin:5px 0; }
        canvas {
            border:3px solid #000;
            width:90vw;
            max-width:400px;
            touch-action:none;
        }
    </style>
</head>
<body>
    <div id="tip">游戏结束</div>
    <div id="score">得分：0</div>
    <div id="map">地图：森林</div>
    <button id="start">开始游戏</button><br>
    <canvas id="c" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const g = 20;

        // 地图 1：森林（绿色）
        let map = 1;
        let bg = "#e8f5e9";
        let barriers = [
            {x:3,y:3},{x:3,y:4},{x:3,y:5},
            {x:10,y:2},{x:11,y:2},{x:12,y:2},
            {x:16,y:16},{x:16,y:17}
        ];
        let portal = {x:18,y:18};

        let snake = [{x:5,y:5}];
        let food = {x:10,y:10};
        let dx=1, dy=0;
        let score=0;
        let run=false;
        let loop;

        // 一开始就画地图！！！（电脑不再是纯白）
        draw();

        function makeFood() {
            food = {
                x:Math.floor(Math.random()*20),
                y:Math.floor(Math.random()*20)
            };
        }

        // 核心：画图顺序绝对正确
        function draw() {
            // 1. 地图底色（绿色/黄色）
            ctx.fillStyle = bg;
            ctx.fillRect(0,0,400,400);

            // 2. 障碍（灰色）
            ctx.fillStyle = "#777";
            barriers.forEach(b => {
                ctx.fillRect(b.x*g, b.y*g, g-1, g-1);
            });

            // 3. 传送门（黄色）
            ctx.fillStyle = "#ff0";
            ctx.fillRect(portal.x*g, portal.y*g, g-1, g-1);

            // 4. 食物（红色）
            ctx.fillStyle = "red";
            ctx.fillRect(food.x*g, food.y*g, g-1, g-1);

            // 5. 蛇
            snake.forEach((s,i) => {
                ctx.fillStyle = i==0 ? "#004d00" : "#0a0";
                ctx.fillRect(s.x*g, s.y*g, g-1, g-1);
            });
        }

        function start() {
            map = 1;
            bg = "#e8f5e9";
            barriers = [
                {x:3,y:3},{x:3,y:4},{x:3,y:5},
                {x:10,y:2},{x:11,y:2},{x:12,y:2},
                {x:16,y:16},{x:16,y:17}
            ];
            portal = {x:18,y:18};
            document.getElementById("map").innerText = "地图：森林";

            snake = [{x:5,y:5}];
            dx=1; dy=0;
            score=0;
            document.getElementById("score").innerText="得分：0";
            document.getElementById("tip").style.display="none";
            run=true;
            makeFood();
            clearInterval(loop);
            loop = setInterval(loopGame, 200);
        }

        function loopGame() {
            let head = {x:snake[0].x+dx, y:snake[0].y+dy};

            // 撞墙/撞障碍
            if(head.x<0||head.x>=20||head.y<0||head.y>=20) { run=false; clearInterval(loop); document.getElementById("tip").style.display="block"; return; }
            for(let b of barriers) { if(head.x==b.x&&head.y==b.y) { run=false; clearInterval(loop); document.getElementById("tip").style.display="block"; return; } }

            // 传送门 → 切地图
            if(head.x==portal.x&&head.y==portal.y) {
                if(map==1) {
                    map=2; bg="#fff3e0";
                    barriers = [{x:8,y:8},{x:9,y:8},{x:10,y:8},{x:2,y:12},{x:17,y:5}];
                    portal={x:2,y:18};
                    document.getElementById("map").innerText="地图：沙漠";
                } else {
                    map=1; bg="#e8f5e9";
                    barriers = [{x:3,y:3},{x:3,y:4},{x:10,y:2},{x:16,y:16}];
                    portal={x:18,y:18};
                    document.getElementById("map").innerText="地图：森林";
                }
                head.x=10; head.y=10;
                makeFood();
            }

            snake.unshift(head);
            if(head.x==food.x&&head.y==food.y) {
                score+=10;
                document.getElementById("score").innerText="得分："+score;
                makeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        // 电脑按键
        document.addEventListener("keydown", e=>{
            if(!run)return;
            if(e.key=="ArrowUp"&&dy!=1) {dx=0; dy=-1;}
            if(e.key=="ArrowDown"&&dy!=-1) {dx=0; dy=1;}
            if(e.key=="ArrowLeft"&&dx!=1) {dx=-1; dy=0;}
            if(e.key=="ArrowRight"&&dx!=-1) {dx=1; dy=0;}
        });

        // 手机滑动
        let sx=0,sy=0;
        canvas.addEventListener("touchstart", e=>{ e.preventDefault(); sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:false});
        canvas.addEventListener("touchmove", e=>{ e.preventDefault(); }, {passive:false});
        canvas.addEventListener("touchend", e=>{
            if(!run)return;
            let x=e.changedTouches[0].clientX;
            let y=e.changedTouches[0].clientY;
            if(Math.abs(x-sx)>Math.abs(y-sy)){
                if(x-sx>0&&dx!=-1) {dx=1;dy=0;}
                else if(dx!=1) {dx=-1;dy=0;}
            }else{
                if(y-sy>0&&dy!=-1) {dx=0;dy=1;}
                else if(dy!=1) {dx=0;dy=-1;}
            }
        },{passive:false});

        document.getElementById("start").onclick=start;
    </script>
</body>
</html>
