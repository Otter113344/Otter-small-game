<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>贪吃蛇最终版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
            overflow: hidden; /* 彻底禁止页面滚动 */
            touch-action: none; /* 禁用所有触摸默认行为 */
            font-family: Arial, sans-serif;
        }
        .game-info {
            margin-bottom: 10px;
            text-align: center;
        }
        #game-over {
            color: #e53935;
            font-size: 18px;
            display: none;
        }
        #score {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        #map-status {
            font-size: 16px;
            color: #424242;
        }
        #start-btn {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
            touch-action: manipulation; /* 保留按钮点击行为 */
        }
        #start-btn:active {
            background-color: #1b5e20;
        }
        #game-canvas {
            border: 3px solid #212121;
            width: 90vw;
            max-width: 400px;
            height: auto;
            touch-action: none; /* 画布禁用触摸默认行为 */
        }
        #hint {
            margin-top: 10px;
            font-size: 14px;
            color: #757575;
        }
    </style>
</head>
<body>
    <div class="game-info">
        <div id="game-over">游戏结束！点击开始重新玩</div>
        <div id="score">得分：0</div>
        <div id="map-status">当前地图：森林（需40分解锁传送门）</div>
    </div>
    <button id="start-btn">开始游戏</button>
    <canvas id="game-canvas" width="400" height="400"></canvas>
    <div id="hint">手机：在画布内滑动控制 | 电脑：方向键控制</div>

    <script>
        // 核心元素获取
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const gameOverText = document.getElementById('game-over');
        const scoreText = document.getElementById('score');
        const mapStatusText = document.getElementById('map-status');

        // 游戏基础配置
        const gridSize = 20; // 格子大小
        const gridCount = 20; // 格子数量（400/20）
        let snake = [{ x: 5, y: 5 }]; // 初始蛇位置
        let food = { x: 10, y: 10 }; // 初始食物位置
        let dx = 1, dy = 0; // 初始移动方向（右）
        let score = 0; // 得分
        let isGameRunning = false; // 游戏运行状态
        let gameLoop = null; // 游戏循环定时器

        // 地图配置（两张地图，不同底色、障碍、传送门）
        const maps = [
            // 地图1：森林（绿色底）
            {
                name: "森林",
                bgColor: "#e8f5e9",
                barriers: [
                    { x: 3, y: 3 }, { x: 3, y: 4 }, { x: 3, y: 5 },
                    { x: 10, y: 2 }, { x: 11, y: 2 }, { x: 12, y: 2 },
                    { x: 16, y: 16 }, { x: 16, y: 17 }
                ],
                portal: { x: 18, y: 18 }, // 传送门位置
                portalUnlocked: false // 传送门是否解锁（默认锁定）
            },
            // 地图2：沙漠（黄色底）
            {
                name: "沙漠",
                bgColor: "#fff3e0",
                barriers: [
                    { x: 8, y: 8 }, { x: 9, y: 8 }, { x: 10, y: 8 },
                    { x: 2, y: 12 }, { x: 2, y: 13 }, { x: 2, y: 14 },
                    { x: 17, y: 5 }, { x: 17, y: 6 }
                ],
                portal: { x: 2, y: 18 }, // 传送门位置
                portalUnlocked: false // 传送门是否解锁（默认锁定）
            }
        ];
        let currentMapIndex = 0; // 当前地图索引（默认森林）
        let currentMap = maps[currentMapIndex];

        // ========== 核心函数 ==========
        // 初始化游戏（重置所有状态）
        function initGame() {
            // 重置地图
            currentMapIndex = 0;
            currentMap = maps[currentMapIndex];
            currentMap.portalUnlocked = false;
            mapStatusText.textContent = `当前地图：${currentMap.name}（需40分解锁传送门）`;

            // 重置蛇
            snake = [{ x: 5, y: 5 }];
            dx = 1;
            dy = 0;

            // 重置得分和状态
            score = 0;
            scoreText.textContent = `得分：${score}`;
            gameOverText.style.display = "none";
            isGameRunning = false;

            // 生成初始食物
            generateFood();
            // 绘制初始界面
            drawGame();
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning) return; // 避免重复点击
            isGameRunning = true;
            gameOverText.style.display = "none";
            
            // 启动游戏循环（200ms/帧，兼顾流畅和操作）
            clearInterval(gameLoop);
            gameLoop = setInterval(updateGame, 200);
        }

        // 生成食物（避开蛇、障碍、传送门）
        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
                // 检查是否与蛇、障碍、传送门重叠
                const hitSnake = snake.some(seg => seg.x === newFood.x && seg.y === newFood.y);
                const hitBarrier = currentMap.barriers.some(bar => bar.x === newFood.x && bar.y === newFood.y);
                const hitPortal = newFood.x === currentMap.portal.x && newFood.y === currentMap.portal.y;
                
                if (!hitSnake && !hitBarrier && !hitPortal) break;
            } while (true);
            food = newFood;
        }

        // 绘制游戏界面（核心：笑脸蛇头+分层绘制）
        function drawGame() {
            // 1. 绘制地图底色
            ctx.fillStyle = currentMap.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 绘制障碍（灰色方块）
            ctx.fillStyle = "#757575";
            currentMap.barriers.forEach(bar => {
                ctx.fillRect(bar.x * gridSize, bar.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // 3. 绘制传送门（黄色方块，仅解锁后显示）
            if (currentMap.portalUnlocked) {
                ctx.fillStyle = "#ffc107";
                ctx.fillRect(currentMap.portal.x * gridSize, currentMap.portal.y * gridSize, gridSize - 1, gridSize - 1);
            }

            // 4. 绘制食物（红色方块）
            ctx.fillStyle = "#f44336";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);

            // 5. 绘制蛇（笑脸蛇头+绿色蛇身）
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;

                if (index === 0) {
                    // 绘制笑脸蛇头（圆形+眼睛+嘴巴，适配移动方向）
                    ctx.fillStyle = "#1b5e20"; // 深绿色蛇头
                    ctx.beginPath();
                    ctx.arc(x + gridSize/2, y + gridSize/2, gridSize/2 - 1, 0, Math.PI * 2);
                    ctx.fill();

                    // 绘制眼睛（白色底+黑色眼珠）
                    ctx.fillStyle = "white";
                    if (dx === 1) { // 向右
                        ctx.fillRect(x + 4, y + 4, 3, 3); // 左眼
                        ctx.fillRect(x + 13, y + 4, 3, 3); // 右眼
                    } else if (dx === -1) { // 向左
                        ctx.fillRect(x + 4, y + 4, 3, 3); // 左眼
                        ctx.fillRect(x + 13, y + 4, 3, 3); // 右眼
                    } else if (dy === 1) { // 向下
                        ctx.fillRect(x + 4, y + 4, 3, 3); // 左眼
                        ctx.fillRect(x + 4, y + 13, 3, 3); // 右眼
                    } else if (dy === -1) { // 向上
                        ctx.fillRect(x + 4, y + 4, 3, 3); // 左眼
                        ctx.fillRect(x + 4, y + 13, 3, 3); // 右眼
                    }
                    // 黑色眼珠
                    ctx.fillStyle = "black";
                    if (dx === 1) {
                        ctx.fillRect(x + 5, y + 5, 1, 1);
                        ctx.fillRect(x + 14, y + 5, 1, 1);
                    } else if (dx === -1) {
                        ctx.fillRect(x + 5, y + 5, 1, 1);
                        ctx.fillRect(x + 14, y + 5, 1, 1);
                    } else if (dy === 1) {
                        ctx.fillRect(x + 5, y + 5, 1, 1);
                        ctx.fillRect(x + 5, y + 14, 1, 1);
                    } else if (dy === -1) {
                        ctx.fillRect(x + 5, y + 5, 1, 1);
                        ctx.fillRect(x + 5, y + 14, 1, 1);
                    }

                    // 绘制嘴巴（弧形笑脸）
                    ctx.strokeStyle = "black";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    if (dx === 1 || dx === -1) { // 左右移动
                        ctx.arc(x + gridSize/2, y + gridSize/2 + 2, 5, 0, Math.PI);
                    } else { // 上下移动
                        ctx.arc(x + gridSize/2 + 2, y + gridSize/2, 5, -Math.PI/2, Math.PI/2);
                    }
                    ctx.stroke();
                } else {
                    // 绘制蛇身（绿色方块）
                    ctx.fillStyle = "#4caf50";
                    ctx.fillRect(x, y, gridSize - 1, gridSize - 1);
                }
            });
        }

        // 更新游戏逻辑（核心：传送门解锁+蛇瞬移）
        function updateGame() {
            // 计算新蛇头位置
            const newHead = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 碰撞判定：撞墙/撞障碍 → 游戏结束
            const hitWall = newHead.x < 0 || newHead.x >= gridCount || newHead.y < 0 || newHead.y >= gridCount;
            const hitBarrier = currentMap.barriers.some(bar => bar.x === newHead.x && bar.y === newHead.y);
            if (hitWall || hitBarrier) {
                isGameRunning = false;
                clearInterval(gameLoop);
                gameOverText.style.display = "block";
                return;
            }

            // 传送门解锁判定：得分≥40分解锁
            if (score >= 40 && !currentMap.portalUnlocked) {
                currentMap.portalUnlocked = true;
                mapStatusText.textContent = `当前地图：${currentMap.name}（传送门已解锁）`;
            }

            // 传送门触发逻辑（仅解锁后生效）
            if (currentMap.portalUnlocked && newHead.x === currentMap.portal.x && newHead.y === currentMap.portal.y) {
                // 切换地图
                currentMapIndex = currentMapIndex === 0 ? 1 : 0;
                currentMap = maps[currentMapIndex];
                currentMap.portalUnlocked = false; // 新地图传送门重置为锁定
                mapStatusText.textContent = `当前地图：${currentMap.name}（需40分解锁传送门）`;

                // 整条蛇瞬移到新地图中心（避免尾巴分家）
                const portalExitX = 10; // 新地图出口X
                const portalExitY = 10; // 新地图出口Y
                snake = snake.map((_, idx) => ({
                    x: portalExitX - idx * dx, // 蛇头在出口，身体依次跟随
                    y: portalExitY - idx * dy
                }));
                newHead.x = portalExitX;
                newHead.y = portalExitY;

                // 重新生成食物
                generateFood();
            }

            // 添加新蛇头
            snake.unshift(newHead);

            // 吃食物判定：加分+生成新食物
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreText.textContent = `得分：${score}`;
                generateFood();
            } else {
                // 没吃到食物，移除蛇尾（保持蛇长度）
                snake.pop();
            }

            // 重新绘制界面
            drawGame();
        }

        // ========== 控制逻辑 ==========
        // 电脑方向键控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            e.preventDefault(); // 阻止方向键滚动页面
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });

        // 手机滑动控制（高灵敏度+禁止页面滑动）
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 禁止触摸默认行为
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 彻底禁止滑动页面
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // 高灵敏度判定（≥5px即触发）
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 5 && dx !== -1) { dx = 1; dy = 0; } // 右滑
                if (diffX < -5 && dx !== 1) { dx = -1; dy = 0; } // 左滑
            } else {
                if (diffY > 5 && dy !== -1) { dx = 0; dy = 1; } // 下滑
                if (diffY < -5 && dy !== -1) { dx = 0; dy = -1; } // 上滑
            }
        }, { passive: false });

        // ========== 事件绑定 ==========
        // 开始按钮点击/触摸事件
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });

        // 页面加载初始化
        window.onload = initGame;

        // 全局禁止页面滑动（兜底）
        document.body.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
